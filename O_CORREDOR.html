        <div class = "texto">
            <p id ="typing" data-texto="Ao sair da sala anterior, você a vê se fechando às suas costas. Você se encontra em um corredor iluminado por alguns braseiros que ficam no chão ao decorrer do caminho. Seguindo pelo corredor, na esperança de conseguir encontrar uma saída do local desconhecido em que está, você avança.
            Até que, por um descuido, acaba pisando em uma armadilha no chão. Você pode ouvir o barulho dos mecanismos à sua volta, até que eles cessam por um momento, apenas para serem interrompidos pelo som de uma gigantesca bola de pedra que começa a rolar em sua direção.
            Instintivamente, você começa a correr, mas a pedra se aproxima mais rápido do que você é capaz de se distanciar. Tudo parece perdido, mas, ao final do corredor, você percebe um buraco no chão."></p>

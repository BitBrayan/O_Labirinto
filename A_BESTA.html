        <div class = "texto">
            <p id="typing" data-texto="Você anda por corredores em círculos, não vendo ou ouvindo nada além dos sons de seus próprios passos. Até que o som de mais passos se junta aos seus. Você pode ouvi-los à sua frente.
            Uma escuridão tenebrosa se estende diante de você, apenas ocasionalmente interrompida pelo vento que sopra algumas das faíscas dos braseiros que adornam os corredores. Você para e observa, ouvindo os passos ficarem cada vez mais próximos. Até que, com um flash das brasas, você vê: uma figura bestial corre em sua direção. Você fica estático por meio segundo, até perceber que precisa tomar uma decisão. Um pouco atrás de onde você está, pode ver uma fresta pela qual poderia se esgueirar ou pode se opor à fera."></p>

        data-texto="Você se opõe à fera que pula sobre você. Suas garras acertam seu pescoço, deixando cortes profundos. A besta se prepara para desferir mais um golpe. Olhando ao seu redor, você vê um pequeno pedaço de ferro incandescente dentro de um dos braseiros. Você estica o braço para agarrá-lo. Quando o ferro entra em contato com a sua mão, sua pele queima, mas não o suficiente para impedi-lo de enfiá-lo no coração do seu algoz. A besta cai no chão, estrebuchando até finalmente parar de se mover. Vitorioso, você fica de pé, apenas para cair novamente logo em seguida. Uma poça começa a se formar à sua volta. Você não consegue mais diferenciar o que é seu e o que era da criatura, até que isso não importa mais.">
